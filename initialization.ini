[in_midi]
; Recovery-oriented defaults for loading in_midi.dll from removable media.
enabled=true
dll_name=in_midi.dll
load_from=removable_drive
active_profile=valient_4200

[valient_4200]
; Requested restore profile: "valient #4200"
request_id=4200
mode=restore
source=jump_drive
restore_deleted_plugin=true
verify_before_write=true

[removable_media]
; Keep evidence intact if drive was unplugged or removed unexpectedly.
auto_mount=true
auto_format=false
read_only_on_error=true
preserve_deleted_entries=true

[logging]
enabled=true
log_file=logs/in_midi_recovery.log
level=info

[notes]
owner=Shayan Aboutalebi
purpose=Recover and initialize plugin state after jump-drive removal without formatting.
